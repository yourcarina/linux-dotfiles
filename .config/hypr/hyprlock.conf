# Hyprlock 示例配置文件
# 更多配置选项请参考：https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# 所有小部件中的渲染文本均支持 Pango 标记语言（例如 <b> 或 <i> 标签）
# 参考：https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# 清除密码缓冲区的快捷键：ESC、Ctrl+U、Ctrl+Backspace
#
# 您可以将此配置复制到 ~/.config/hypr/hyprlock.conf 开始使用

$font = Monospace  # 字体设置

general {
    hide_cursor = true  # 隐藏光标
}

# 取消注释以启用指纹认证
# auth {
#     fingerprint {
#         enabled = true                    # 启用指纹认证
#         ready_message = Scan fingerprint to unlock    # 准备就绪提示信息
#         present_message = Scanning...                # 扫描中提示信息
#         retry_delay = 250                           # 重试延迟（毫秒）
#     }
# }

animations {
    enabled = true           # 启用动画
    bezier = linear, 1, 1, 0, 0  # 线性贝塞尔曲线
    animation = fadeIn, 1, 5, linear    # 淡入动画
    animation = fadeOut, 1, 5, linear   # 淡出动画
    animation = inputFieldDots, 1, 2, linear  # 输入框圆点动画
}

background {
    monitor =          # 显示器（留空表示所有显示器）
    path = ~/Pictures/Wallpapers/wallpaper-lockscreen  # 背景图片路径
    blur_passes = 1    # 模糊处理次数
}

input-field {
    monitor =          # 显示器（留空表示所有显示器）
    size = 16%, 4%     # 输入框尺寸（宽度，高度）
    outline_thickness = 1  # 轮廓线粗细
    inner_color = rgba(0, 0, 0, 0.0)  # 内部填充颜色（透明无填充）

    # 颜色设置
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg    # 外框颜色（渐变）
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg   # 验证中颜色
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg     # 验证失败颜色

    font_color = rgb(255, 255, 255)
    fade_on_empty = true            # 输入为空时是否淡出
    rounding = 64                   # 圆角半径

    font_family = $font  # 字体族

    # 密码输入框提示文本
    placeholder_text = Enter Your Password:

    # 验证失败提示文本
    fail_text = $PAMFAIL  # 使用系统 PAM 失败信息

    # 取消注释以使用字符而不是圆点来指示输入的密码
    # dots_text_format = A
    dots_size = 0.4         # 圆点大小
    dots_spacing = 0.4      # 圆点间距

    # 取消注释以使用不显示密码长度的输入指示器（类似于 swaylock 的输入指示器）
    # hide_input = true

    # 位置设置
    position = 0, -20    # 位置坐标（x, y）
    halign = center      # 水平对齐方式
    valign = center      # 垂直对齐方式
}

# 时间显示
label {
    monitor =          # 显示器（留空表示所有显示器）
    text = $TIME       # 时间文本（变量替换参考：https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution）
    font_size = 90     # 字体大小
    font_family = $font  # 字体族

    position = 0, 300    # 位置坐标（x, y）
    halign = center     # 水平对齐方式（居中）
    valign = center     # 垂直对齐方式（居中）
}

# 日期显示
label {
    monitor =          # 显示器（留空表示所有显示器）
    text = cmd[update:60000] date +"%A %D"  # 日期文本（每60秒更新一次）
    font_size = 25     # 字体大小
    font_family = $font  # 字体族

    position = 0, 200  # 位置坐标（x, y）
    halign = center     # 水平对齐方式（居中）
    valign = center     # 垂直对齐方式（居中）
}

# 用户问候标签
label {
    monitor =           # 显示器（留空表示所有显示器）
    text = $USER        # 使用系统用户名
    font_size = 16      # 字体大小
    position = 0, 32    # 调整后的位置坐标（居中偏下）
    halign = center     # 水平对齐方式（居中）
    valign = center     # 垂直对齐方式（居中）
}